{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Media Converter{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'converter/css/style.css' %}?v=wow6">
  <link rel ="icon" href = "{% static 'converter/favicon.ico' %}">
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-mesh"></div>

  <header class="site-header">
    <div class="site-header-row">
      <a class="brand" href="{% url 'home' %}">
        <div class="brand-badge">MC</div>
        <span>Media Converter</span>
      </a>

      <nav class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        {% if user.is_authenticated %}
          <a href="{% url 'my_downloads' %}">Downloads</a>
          <a href="{% url 'my_favorites' %}">Favorites</a>
          <a href="{% url 'my_presets' %}">Presets</a>
          <a href="{% url 'logout' %}" style="color: #ff4d6d">Logout</a>
        {% else %}
          <a href="{% url 'login' %}">Login</a>
          <a href="{% url 'register' %}">Register</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      document.body.style.setProperty('--mouse-x', x + '%');
      document.body.style.setProperty('--mouse-y', y + '%');
    });
  </script>
</body>
</html>
