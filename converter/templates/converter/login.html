{% extends "converter/base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="reveal" style="max-width: 500px; margin: 4rem auto">
  <div class="glass-card">
    <h2 style="text-align: center; margin-bottom: 3rem">Welcome Back</h2>

    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <p style="color: var(--danger); font-size: 0.8rem; margin-top: 0.5rem">
            {{ field.errors.0 }}
          </p>
        {% endif %}
      </div>
      {% endfor %}

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem">
        Login to Dashboard
      </button>
    </form>

    <div style="margin-top: 2rem; text-align: center; color: var(--muted); font-size: 0.9rem">
      New here? <a href="{% url 'register' %}" style="color: var(--accent2); font-weight: 700">Create an account</a>
    </div>
  </div>
</div>
{% endblock %}
